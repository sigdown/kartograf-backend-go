name: CI

on:
  push:
    branches:
      - main
      - feature/**
      - bugfix/**
      - chore/**

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      
      - name: Run tests
        run: make test

      - name: build
        run: make build

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: test -z "$(gofmt -l .)"
